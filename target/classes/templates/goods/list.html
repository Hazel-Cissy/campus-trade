<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园二手交易</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/goods/list}">校园二手交易</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/goods/publish}">发布商品</a>
            <a class="nav-link" th:href="@{/goods/my}">我的发布</a>
            <a class="nav-link" th:href="@{/order/my}">我的订单</a>
            <a class="nav-link" th:href="@{/logout}">退出</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- 搜索与筛选 -->
    <form class="row g-2 mb-4" th:action="@{/goods/list}" method="get">
        <div class="col-md-3">
            <select name="categoryId" class="form-select">
                <option value="">全部分类</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}"
                        th:selected="${categoryId != null && categoryId == c.id}"></option>
            </select>
        </div>
        <div class="col-md-5">
            <input type="text" name="keyword" class="form-control"
                   placeholder="搜索商品..." th:value="${keyword}">
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-outline-primary w-100">搜索</button>
        </div>
    </form>

    <!-- 商品列表 -->
    <div class="row">
        <div class="col-md-3 mb-4" th:each="goods : ${result.records}">
            <div class="card h-100">
                <div class="card-body">
                    <h6 class="card-title" th:text="${goods.title}">商品名</h6>
                    <p class="text-danger fw-bold">¥<span th:text="${goods.price}">0</span></p>
                    <p class="text-muted small">
                        <span th:text="${#temporals.format(goods.createTime, 'yyyy-MM-dd')}"></span>
                        <span class="badge bg-success ms-2" th:text="${goods.status}"></span>
                    </p>
                    <a class="btn btn-sm btn-primary" th:href="@{/goods/detail(id=${goods.id})}">查看详情</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 无数据提示 -->
    <div th:if="${result.records == null || result.records.isEmpty()}" class="text-center text-muted py-5">
        <h4>暂无商品，<a th:href="@{/goods/publish}">去发布</a></h4>
    </div>

    <!-- 分页 -->
    <nav th:if="${result.total > 0}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${!result.hasPrevious()} ? 'disabled'">
                <a class="page-link" th:href="@{/goods/list(page=${result.current - 1}, categoryId=${categoryId}, keyword=${keyword})}">上一页</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="'第' + ${result.current} + '页 / 共' + ${result.pages} + '页'"></span>
            </li>
            <li class="page-item" th:classappend="${!result.hasNext()} ? 'disabled'">
                <a class="page-link" th:href="@{/goods/list(page=${result.current + 1}, categoryId=${categoryId}, keyword=${keyword})}">下一页</a>
            </li>
        </ul>
    </nav>
</div>

<script th:src="@{/js/jquery.min.js}"></script>
</body>
</html>
