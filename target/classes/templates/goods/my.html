<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的发布 - 校园二手交易</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/goods/list}">校园二手交易</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/goods/list}">商品列表</a>
            <a class="nav-link" th:href="@{/goods/publish}">发布商品</a>
            <a class="nav-link" th:href="@{/order/my}">我的订单</a>
            <a class="nav-link" th:href="@{/logout}">退出</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>我的发布</h3>
    <table class="table" th:if="${goodsList != null && !goodsList.isEmpty()}">
        <thead>
            <tr>
                <th>标题</th>
                <th>价格</th>
                <th>状态</th>
                <th>发布时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="goods : ${goodsList}">
                <td th:text="${goods.title}"></td>
                <td>¥<span th:text="${goods.price}"></span></td>
                <td><span class="badge" th:classappend="${goods.status == '在售'} ? 'bg-success' : 'bg-secondary'" th:text="${goods.status}"></span></td>
                <td th:text="${#temporals.format(goods.createTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <button th:if="${goods.status == '在售'}"
                            class="btn btn-sm btn-outline-danger"
                            th:onclick="'offShelf(' + ${goods.id} + ')'">
                        下架
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
    <div th:unless="${goodsList != null && !goodsList.isEmpty()}" class="text-center text-muted py-5">
        <h4>还没有发布任何商品，<a th:href="@{/goods/publish}">去发布</a></h4>
    </div>
</div>

<script th:src="@{/js/jquery.min.js}"></script>
<script>
function offShelf(id) {
    if (!confirm('确认下架？')) return;
    $.ajax({
        url: '/campus/goods/offshelf',
        type: 'POST',
        data: { id: id },
        success: function(res) {
            if (res.code === 200) {
                location.reload();
            } else {
                alert(res.msg);
            }
        }
    });
}
</script>
</body>
</html>
